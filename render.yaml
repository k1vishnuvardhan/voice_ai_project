services:
  - type: web
    name: murf-voice-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MURF_API_KEY
        sync: false
      - key: MURF_VOICE_ID
        value: en-US-natalie
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/auto
